name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  viewer-web:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/viewer-web/package-lock.json

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install root dependencies
        run: npm ci

      - name: Install viewer dependencies
        run: npm ci --prefix apps/viewer-web

      - name: Download sample dataset
        run: npm run download-samples -- autzen

      - name: Type check
        run: npm --prefix apps/viewer-web run typecheck

      - name: Run tests
        run: npm --prefix apps/viewer-web test

      - name: Generate coverage
        run: npm --prefix apps/viewer-web run coverage

      - name: Build production bundle
        run: npm --prefix apps/viewer-web run build
